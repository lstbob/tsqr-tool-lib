services:
  postgres:
    image: postgres:16
    container_name: tsqr-postgres
    environment:
      POSTGRES_DB: tsqr_tool_library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
